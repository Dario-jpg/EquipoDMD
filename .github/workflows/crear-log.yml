name: Crear Log

on:
  push:

jobs:
  log:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Crear archivo log
        run: |
          echo "Commit hecho por ${{ github.actor }}" >> log.txt
          echo "Mensaje: ${{ github.event.head_commit.message }}" >> log.txt

      - name: Subir cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add log.txt
          git commit -m "Actualizar log"
          git push